android.useAndroidX=true
android.enableJetifier=true
# line.separator=LF: R8 writes META-INF/services with the platform line
# separator; forcing LF keeps Windows builds byte-identical to the
# F-Droid Linux builders (reproducible builds).
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
systemProp.line.separator=\n
org.gradle.parallel=true
kotlin.code.style=official
